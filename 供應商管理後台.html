const gm = (p) => {
  if (!p||!p.retailPrice||p.retailPrice===0) return '0.0';
  if(p.profitMode==='commission') return (p.commissionAmount||0).toFixed(1);
  return ((p.retailPrice-(p.purchasePrice||0))/p.retailPrice*100).toFixed(1);
};
const gmStyle = (m) => {
  const v=parseFloat(m);

};
const profitCalc = (p) => {
  if(!p||!p.retailPrice) return {toVendor:0,ourProfit:0};
  if(p.profitMode==='commission'){const ourProfit=Math.round(p.retailPrice*(p.commissionAmount||0)/100);return {toVendor:p.retailPrice-ourProfit,ourProfit};}

};

function LoginPage({onLogin}) {
  const [identity,setIdentity]=useState('admin');const [email,setEmail]=useState('');const [password,setPassword]=useState('');const [error,setError]=useState('');const [msg,setMsg]=useState('');const [loading,setLoading]=useState(false);const [showForgot,setShowForgot]=useState(false);
  const handleLogin=async()=>{setLoading(true);setError('');setMsg('');
    const {data,error:authErr}=await supabaseClient.auth.signInWithPassword({email,password});
    if(authErr){setError('登入失敗：'+authErr.message);setLoading(false);return;}
    const {data:profile}=await supabaseClient.from('app_users').select('role,vendor_id,display_name,permissions,identity').eq('id',data.user.id).single();
    if(!profile){setError('找不到使用者角色，請聯繫管理員');setLoading(false);return;}
    onLogin({role:profile.role,vendorId:profile.vendor_id,displayName:profile.display_name||'',permissions:profile.permissions||[],identity:profile.identity||''});setLoading(false);
  };
  const handleForgot=async()=>{if(!email){setError('請先輸入 Email');return;}setLoading(true);setError('');
    const {error:e}=await supabaseClient.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+window.location.pathname});
    if(e)setError('發送失敗：'+e.message);else setMsg('密碼重設信已寄出，請查看信箱');setLoading(false);
  };
  return (<div className="min-h-screen bg-gradient-to-br from-brand-dark to-brand-active flex items-center justify-center"><div className="bg-white rounded-2xl shadow-2xl p-8 w-96"><h1 className="text-2xl font-bold text-center text-brand-dark mb-2">戶沐淨派單系統</h1><p className="text-center text-gray-400 text-sm mb-6">Homood Dispatch System</p><div className="flex mb-6 bg-gray-100 rounded-lg p-1"><button onClick={()=>setIdentity('admin')} className={`flex-1 py-2 rounded-md text-sm font-medium transition ${identity==='admin'?'bg-brand-dark text-white shadow':'text-gray-500 hover:text-gray-700'}`}>平台管理者</button><button onClick={()=>setIdentity('partner')} className={`flex-1 py-2 rounded-md text-sm font-medium transition ${identity==='partner'?'bg-brand-dark text-white shadow':'text-gray-500 hover:text-gray-700'}`}>合作夥伴</button></div>{showForgot?(<div><div className="mb-4"><label className="text-sm font-medium text-gray-700 block mb-1">Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" className="w-full border border-gray-300 rounded px-3 py-2 text-sm"/></div>{error&&<div className="text-red-500 text-sm mb-4 bg-red-50 p-2 rounded">{error}</div>}{msg&&<div className="text-green-700 text-sm mb-4 bg-green-50 p-2 rounded">{msg}</div>}<button onClick={handleForgot} disabled={loading} className="w-full bg-brand-dark text-white py-2 rounded-lg font-medium hover:bg-brand-active disabled:opacity-50 mb-3">{loading?'寄送中...':'寄送重設密碼信'}</button><button onClick={()=>{setShowForgot(false);setError('');setMsg('');}} className="w-full text-gray-500 text-sm hover:text-gray-700">← 返回登入</button></div>):(<div><div className="mb-4"><label className="text-sm font-medium text-gray-700 block mb-1">Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} placeholder="your@email.com" className="w-full border border-gray-300 rounded px-3 py-2 text-sm"/></div><div className="mb-4"><label className="text-sm font-medium text-gray-700 block mb-1">密碼</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} placeholder="輸入密碼" className="w-full border border-gray-300 rounded px-3 py-2 text-sm"/></div>{error&&<div className="text-red-500 text-sm mb-4 bg-red-50 p-2 rounded">{error}</div>}<button onClick={handleLogin} disabled={loading} className="w-full bg-brand-dark text-white py-2 rounded-lg font-medium hover:bg-brand-active disabled:opacity-50 mb-3">{loading?'登入中...':'登入'}</button><button onClick={()=>{setShowForgot(true);setError('');}} className="w-full text-gray-400 text-sm hover:text-gray-600">忘記密碼？</button></div>)}</div></div>);
}

function MultiSelectDropdown({label,options,value,onChange}) {

function DashboardPage({orders,vendors,globalProducts,caseHandlers}) {
  const [period,setPeriod]=useState('all');

  const filtered=period==='month'?orders.filter(o=>(o.createdAt||'').startsWith(thisMonth)):period==='year'?orders.filter(o=>(o.createdAt||'').startsWith(thisYear)):orders;
  const allTasks=filtered.flatMap(o=>o.tasks||[]);
  const totalRevenue=allTasks.reduce((s,t)=>s+(t.totalPrice||0),0);
  const statusCounts={};ORDER_STATUSES.forEach(s=>{statusCounts[s.id]=filtered.filter(o=>o.status===s.id).length;});
  const productSales={};allTasks.forEach(t=>{const p=globalProducts.find(x=>x.id===t.productId);if(p){if(!productSales[p.name])productSales[p.name]={qty:0,revenue:0};productSales[p.name].qty+=(t.qty||1);productSales[p.name].revenue+=(t.totalPrice||0);}});

  return (<div className="p-6">
    <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-bold">📊 儀表板</h2><div className="flex gap-2"><PeriodBtn id="month" label="本月"/><PeriodBtn id="year" label="本年度"/><PeriodBtn id="all" label="全部"/></div></div>
    <div className="grid grid-cols-4 gap-4 mb-6">

      <div className="bg-white rounded-xl shadow p-5"><div className="text-xs text-gray-400 mb-1">總營收</div><div className="text-2xl font-bold text-green-600">NT${totalRevenue.toLocaleString()}</div></div>

function VendorScheduleView({caseHandlers,schedules,setSchedules}) {
  const toggleDate=async(hid,date)=>{const cycle=['none','morning','afternoon','full'];const c=schedules[hid]?.[date]||'none';const idx=cycle.indexOf(c);const ns=cycle[(idx+1)%cycle.length];setSchedules({...schedules,[hid]:{...schedules[hid],[date]:ns}});await supabaseClient.from('schedules').upsert({handler_id:hid,date,status:ns},{onConflict:'handler_id,date'});};

  const dates=getWeekDates(weekOffset);

    <div className="flex items-center gap-3 mb-4"><button onClick={()=>setWeekOffset(weekOffset-1)} className="bg-gray-200 px-3 py-1 rounded text-sm">← 前兩週</button><button onClick={()=>setWeekOffset(0)} className="bg-brand-dark text-white px-3 py-1 rounded text-sm">本週</button><button onClick={()=>setWeekOffset(weekOffset+1)} className="bg-gray-200 px-3 py-1 rounded text-sm">後兩週 →</button><span className="text-sm text-gray-500">{dates[0]} ~ {dates[dates.length-1]}</span></div>

    <div className="space-y-4">{caseHandlers.map(h=>(<div key={h.id} className="bg-white rounded shadow p-4"><div className="font-medium mb-3">{h.name}</div><div className="grid grid-cols-7 gap-1">{dates.map(date=>{const s=schedules[h.id]?.[date]||'none';const bg=s==='morning'?'#fef9c3':s==='afternoon'?'#dbeafe':s==='full'?'#fee2e2':'#f3f4f6';return(<button key={date} onClick={()=>toggleDate(h.id,date)} style={{background:bg}} className="px-1 py-2 rounded text-xs font-medium text-center">{date.slice(5)}<br/><span>{s==='morning'?'上午':s==='afternoon'?'下午':s==='full'?'全天':'空閒'}</span></button>);})}</div></div>))}</div></div>);
}

function VendorNotes({vendor,setVendors,vendors}) {

  const addNote=async()=>{if(!noteText.trim())return;const note={id:mkId('vn'),text:noteText.trim(),createdAt:new Date().toLocaleString('zh-TW')};setVendors(vendors.map(v=>v.id===vendor.id?{...v,notes:[...(v.notes||[]),note]}:v));setNoteText('');await supabaseClient.from('vendor_notes').insert({id:note.id,vendor_id:vendor.id,text:note.text,created_at:note.createdAt});};
  const insertEmoji=(emoji)=>{const ta=taRef.current;if(ta){const s=ta.selectionStart,e=ta.selectionEnd;const nv=noteText.slice(0,s)+emoji+noteText.slice(e);setNoteText(nv);setTimeout(()=>{ta.focus();ta.setSelectionRange(s+emoji.length,s+emoji.length);},0);}else setNoteText(noteText+emoji);};
  return (<div className="border border-gray-100 rounded"><button onClick={()=>setOpen(!open)} className="w-full flex justify-between items-center px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">📝 往來記錄（{(vendor.notes||[]).length} 筆）<span>{open?'▲':'▼'}</span></button>{open&&(<div className="px-3 pb-3">{(vendor.notes||[]).map(n=>(<div key={n.id} className="bg-gray-50 p-2 rounded border border-gray-200 text-sm mb-2"><div>{n.text}</div><div className="text-xs text-gray-400 mt-1">{n.createdAt}</div></div>))}<div className="flex gap-2 items-end mt-2"><div className="flex-1"><textarea ref={taRef} value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="輸入往來記錄..." className="w-full border border-gray-300 rounded px-3 py-2 text-sm resize-none" rows={2}/></div><div className="flex flex-col gap-1"><EmojiPicker onSelect={insertEmoji}/><button onClick={addNote} className="bg-brand-dark text-white px-3 py-1 rounded text-sm">新增</button></div></div></div>)}</div>);
}

function VendorDetailModal({vendor,globalProducts,orders,vendors,setVendors,onClose,vendorUsers,setVendorUsers}) {
  const [openSections,setOpenSections]=useState({});
  const toggleSection=(sec)=>setOpenSections(prev=>({...prev,[sec]:!prev[sec]}));
  const isSec=(sec)=>!!openSections[sec];
  const prods=globalProducts.filter(p=>p.vendorId===vendor.id);
  const avgMargin=prods.length>0?(prods.reduce((s,p)=>s+parseFloat(gm(p)),0)/prods.length).toFixed(1):0;
  const vo=orders.filter(o=>o.vendorId===vendor.id);
  const completed=vo.filter(o=>o.status==='completed');
  const revenue=vo.reduce((s,o)=>s+o.tasks.reduce((ts,t)=>ts+(t.totalPrice||0),0),0);
  const now=new Date();const ym=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthOrders=vo.filter(o=>o.createdAt.startsWith(ym));
  const rate=vo.length>0?(completed.length/vo.length*100).toFixed(0):0;
  const stats={total:vo.length,revenue,month:monthOrders.length,rate};
  const isActive=vendor.status!=='inactive';
  const expiryDiff=(()=>{if(!vendor.contractEnd)return null;const d=new Date(vendor.contractEnd.replace(/\//g,'-'));const diff=Math.ceil((d-new Date())/(1000*60*60*24));return diff<30&&diff>=0?diff:null;})();
  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-screen overflow-y-auto">
        <div className="p-5 border-b border-gray-200 flex justify-between items-start">
          <div>
            <div className="flex items-center gap-2 flex-wrap">
              <h2 className="text-xl font-bold">{vendor.name}</h2>
              <span className={`px-2 py-0.5 rounded text-xs font-medium ${isActive?'bg-green-100 text-green-700':'bg-gray-200 text-gray-500'}`}>{isActive?'啟用':'停用'}</span>
              {expiryDiff!==null&&<span className="bg-orange-100 text-orange-600 px-2 py-0.5 rounded text-xs">⚠️ 合約 {expiryDiff} 天到期</span>}
            </div>
            <div className="text-sm text-gray-600 mt-1">{vendor.contact} | {vendor.phone} | {vendor.email}</div>
            {vendor.taxId&&<div className="text-xs text-gray-400 mt-0.5">統編：{vendor.taxId}　地址：{vendor.address||'—'}</div>}
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none ml-4 shrink-0">×</button>
        </div>
        <div className="p-5 space-y-2">
          <div className="border border-gray-100 rounded">
            <button onClick={()=>toggleSection('contract')} className="w-full flex justify-between items-center px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">📋 合約與付款資訊 <span>{isSec('contract')?'▲':'▼'}</span></button>
            {isSec('contract')&&(<div className="px-3 pb-3 grid grid-cols-3 gap-2 text-sm"><div><span className="text-gray-500">銀行：</span>{vendor.bankName||'—'}</div><div><span className="text-gray-500">帳號：</span>{vendor.bankAccount||'—'}</div><div><span className="text-gray-500">付款條件：</span>{vendor.paymentTerms||'—'}</div><div><span className="text-gray-500">合約起：</span>{vendor.contractStart||'—'}</div><div><span className="text-gray-500">合約迄：</span>{vendor.contractEnd||'—'}</div><div><span className="text-gray-500">服務類別：</span>{(vendor.categories||[]).join(', ')||'—'}</div></div>)}
          </div>
          <div className="border border-gray-100 rounded">
            <button onClick={()=>toggleSection('regions')} className="w-full flex justify-between items-center px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">🗺️ 服務地區（{(vendor.regions||[]).length} 縣市） <span>{isSec('regions')?'▲':'▼'}</span></button>
            {isSec('regions')&&(<div className="px-3 pb-3 flex flex-wrap gap-1">{(vendor.regions||[]).length>0?(vendor.regions||[]).map(r=><span key={r} className="bg-brand-light text-brand-dark px-2 py-0.5 rounded text-xs">{r}</span>):<span className="text-gray-400 text-xs">未設定</span>}</div>)}
          </div>
          <div className="border border-gray-100 rounded">
            <button onClick={()=>toggleSection('stats')} className="w-full flex justify-between items-center px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">📊 營運數據 <span>{isSec('stats')?'▲':'▼'}</span></button>
            {isSec('stats')&&(<div className="px-3 pb-3 grid grid-cols-4 gap-3 text-center mt-2"><div className="bg-brand-light p-3 rounded"><div className="text-2xl font-bold text-brand-dark">{stats.total}</div><div className="text-xs text-gray-500 mt-1">累計接案</div></div><div className="bg-green-50 p-3 rounded"><div className="text-lg font-bold text-green-600">NT${stats.revenue.toLocaleString()}</div><div className="text-xs text-gray-500 mt-1">累計金額</div></div><div className="bg-yellow-50 p-3 rounded"><div className="text-2xl font-bold text-yellow-600">{stats.month}</div><div className="text-xs text-gray-500 mt-1">本月案件</div></div><div className="bg-purple-50 p-3 rounded"><div className="text-2xl font-bold text-purple-600">{stats.rate}%</div><div className="text-xs text-gray-500 mt-1">完成率</div></div></div>)}
          </div>
          <div className="border border-gray-100 rounded">
            <button onClick={()=>toggleSection('margin')} className="w-full flex justify-between items-center px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">💰 商品毛利率（{prods.length} 項，平均 <span style={gmStyle(avgMargin)} className="px-1.5 rounded mx-1">{avgMargin}%</span>） <span>{isSec('margin')?'▲':'▼'}</span></button>
            {isSec('margin')&&(<div className="px-3 pb-3">{prods.map(p=>{const calc=profitCalc(p);return(<div key={p.id} className="flex justify-between text-xs mb-1 bg-gray-50 p-2 rounded"><span>{p.name}</span><span className="flex gap-2 items-center"><span className="text-gray-400">付 NT${calc.toVendor} | 得 NT${calc.ourProfit}</span><span style={gmStyle(gm(p))} className="px-2 py-0.5 rounded">{gm(p)}%</span></span></div>);})} </div>)}
          </div>
          <VendorNotes vendor={vendor} setVendors={setVendors} vendors={vendors}/>
          <VendorUsersSection vendor={vendor} vendorUsers={vendorUsers} setVendorUsers={setVendorUsers}/>
        </div>
      </div>
    </div>
  );
}
function VendorAccountManager({vendor}) {
  const [accounts,setAccounts]=useState([]);const [loading,setLoading]=useState(true);const [creating,setCreating]=useState(false);
  const [newAcc,setNewAcc]=useState({email:'',password:'',displayName:vendor.name});const [error,setError]=useState('');const [msg,setMsg]=useState('');
  const [editId,setEditId]=useState(null);const [editForm,setEditForm]=useState({});
  const loadAccounts=async()=>{const{data}=await supabaseClient.from('app_users').select('id,role,vendor_id,display_name,permissions,identity').eq('vendor_id',vendor.id);setAccounts(data||[]);setLoading(false);};
  useEffect(()=>{loadAccounts();},[vendor.id]);
  const createAccount=async()=>{setError('');setMsg('');if(!newAcc.email||!newAcc.password){setError('請填寫 Email 和密碼');return;}if(newAcc.password.length<6){setError('密碼至少 6 個字元');return;}
    const{data:{session:adminSession}}=await supabaseClient.auth.getSession();
    const{data:sd,error:e}=await supabaseClient.auth.signUp({email:newAcc.email,password:newAcc.password,options:{data:{role:'vendor',display_name:newAcc.displayName}}});
    if(e){if(adminSession)await supabaseClient.auth.setSession({access_token:adminSession.access_token,refresh_token:adminSession.refresh_token});setError('建立失敗：'+e.message);return;}
    if(sd?.user){const{error:rpcErr}=await supabaseClient.rpc('create_vendor_account',{user_id_param:sd.user.id,vendor_id_param:vendor.id,display_name_param:newAcc.displayName});
      if(rpcErr){setError('帳號已建但角色設定失敗：'+rpcErr.message);}}
    if(adminSession){await supabaseClient.auth.setSession({access_token:adminSession.access_token,refresh_token:adminSession.refresh_token});}
    setMsg('帳號建立成功！');setNewAcc({email:'',password:'',displayName:vendor.name});setCreating(false);loadAccounts();
  };
  const saveEdit=async()=>{await supabaseClient.from('app_users').update({display_name:editForm.display_name,identity:editForm.identity}).eq('id',editId);setAccounts(accounts.map(a=>a.id===editId?{...a,...editForm}:a));setEditId(null);};
  const deleteAccount=async(acc)=>{if(!window.confirm(`確定刪除「${acc.display_name||acc.id}」的帳號？此操作無法復原。`))return;await supabaseClient.from('app_users').delete().eq('id',acc.id);setAccounts(accounts.filter(a=>a.id!==acc.id));};
  if(loading)return <div className="text-gray-400 text-sm">載入中...</div>;
  return (<div>
    <div className="font-bold mb-3">🔑 「{vendor.name}」帳號管理</div>
    {accounts.length>0?(<div className="space-y-2 mb-4">{accounts.map(acc=>(<div key={acc.id} className="bg-white p-3 rounded border border-gray-200">
      {editId===acc.id?(<div className="grid grid-cols-2 gap-3"><Input label="顯示名稱" value={editForm.display_name} onChange={v=>setEditForm({...editForm,display_name:v})}/><Input label="身份" value={editForm.identity||''} onChange={v=>setEditForm({...editForm,identity:v})}/><div className="col-span-2 flex gap-2"><button onClick={saveEdit} className="bg-green-500 text-white px-3 py-1 rounded text-sm">保存</button><button onClick={()=>setEditId(null)} className="bg-gray-500 text-white px-3 py-1 rounded text-sm">取消</button></div></div>):(
      <div className="flex justify-between items-center"><div><div className="font-medium text-sm">{acc.display_name||'—'}</div><div className="text-xs text-gray-500">{acc.identity||'合作夥伴'}</div></div><div className="flex gap-1"><button onClick={()=>{setEditId(acc.id);setEditForm({display_name:acc.display_name||'',identity:acc.identity||''});}} className="bg-brand-dark text-white px-2 py-1 rounded text-xs">編輯</button><button onClick={()=>deleteAccount(acc)} className="bg-red-500 text-white px-2 py-1 rounded text-xs">刪除</button></div></div>)}
    </div>))}</div>):(<div className="text-gray-400 text-sm mb-4">尚未建立登入帳號</div>)}
    {creating?(<div className="bg-white p-4 rounded border"><div className="grid grid-cols-3 gap-3"><Input label="Email" value={newAcc.email} onChange={v=>setNewAcc({...newAcc,email:v})}/><Input label="密碼（至少6字元）" type="password" value={newAcc.password} onChange={v=>setNewAcc({...newAcc,password:v})}/><Input label="顯示名稱" value={newAcc.displayName} onChange={v=>setNewAcc({...newAcc,displayName:v})}/></div>
      {error&&<div className="text-red-500 text-sm mt-2 bg-red-50 p-2 rounded">{error}</div>}
      {msg&&<div className="text-green-700 text-sm mt-2 bg-green-50 p-2 rounded">{msg}</div>}
      <div className="flex gap-2 mt-3"><button onClick={createAccount} className="bg-green-500 text-white px-4 py-2 rounded text-sm">建立帳號</button><button onClick={()=>{setCreating(false);setError('');setMsg('');}} className="bg-gray-500 text-white px-4 py-2 rounded text-sm">取消</button></div>
    </div>):(<button onClick={()=>setCreating(true)} className="bg-purple-500 text-white px-3 py-1.5 rounded text-sm">＋ 新增登入帳號</button>)}
  </div>);
}

function VendorUsersSection({vendor,vendorUsers,setVendorUsers}) {
  const [open,setOpen]=useState(false);const [newUser,setNewUser]=useState(null);
  const users=(vendorUsers||{})[vendor.id]||[];
  const addUser=async()=>{const nu={id:mkId('vu'),name:newUser.name,email:newUser.email,permissions:newUser.permissions||['view']};const vid=vendor.id;setVendorUsers({...vendorUsers,[vid]:[...(vendorUsers[vid]||[]),nu]});setNewUser(null);await supabaseClient.from('vendor_users').insert({id:nu.id,vendor_id:vid,name:nu.name,email:nu.email,permissions:nu.permissions});};
  return (<div className="border border-gray-100 rounded"><button onClick={()=>setOpen(!open)} className="w-full flex justify-between items-center px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">👤 使用人員帳號（{users.length} 人）<span>{open?'▲':'▼'}</span></button>{open&&(<div className="px-3 pb-3">
    {users.map(u=>(<div key={u.id} className="bg-gray-50 p-2 rounded border border-gray-200 text-sm mb-2"><div className="font-medium">{u.name}</div><div className="text-gray-600 text-xs">{u.email} | 權限: {(u.permissions||[]).join(', ')}</div></div>))}

  </div>)}</div>);
}

function VendorManagementPage({vendors,setVendors,globalProducts,orders,vendorUsers,setVendorUsers,reloadData}) {

ta.note||''} onChange={v=>setEditData({...editData,note:v})}/><ProfitModeForm data={editData} setData={setEditData}/><ProfitPreview data={editData}/><div className="col-span-3 flex gap-2"><button onClick={saveEdit} className="bg-green-500 text-white px-4 py-2 rounded text-sm">保存</button><button onClick={()=>setEditingId(null)} className="bg-gray-500 text-white px-4 py-2 rounded text-sm">取消</button></div></div></td></tr>)}</React.Fragment>);})}</tbody></table>

xt-sm">刪除</button></div></>)}</div>)}</div>);})}</div>

const HANDLER_CSV_COLS=[{key:'name',label:'姓名'},{key:'phone',label:'電話'},{key:'email',label:'Email'},{key:'vendorName',label:'所屬合作夥伴名稱'},{key:'regions',label:'服務地區（逗號分隔）'}];
const HANDLER_SAMPLE=['陳小明','0921-111-222','chen@example.com','好乾淨清潔','台北市,新北市'];

function ImportExportToolbar({data,columns,filename,entityName,onImportDone,tableName,transformRow,uniqueFields,sampleRow}) {
  const [showImport,setShowImport]=useState(false);const [importData,setImportData]=useState([]);const [importMode,setImportMode]=useState('insert');const [matchField,setMatchField]=useState('');const [step,setStep]=useState('upload');const [importing,setImporting]=useState(false);const [result,setResult]=useState('');
  const parseFile=(f)=>{if(!f)return;if(!f.name.endsWith('.csv')){alert('請上傳 CSV 格式的檔案（.csv）\n\n提示：如果用 Numbers 開啟過，請用「檔案 → 輸出為 → CSV」另存');return;}Papa.parse(f,{header:true,skipEmptyLines:true,complete:(r)=>{setImportData(r.data);setStep('configure');}});};
  const handleFile=(e)=>{parseFile(e.target.files[0]);};
  const handleDrop=(e)=>{e.preventDefault();e.stopPropagation();parseFile(e.dataTransfer.files[0]);};
  const handleDragOver=(e)=>{e.preventDefault();e.stopPropagation();};
  const doImport=async()=>{setImporting(true);setResult('');
    const rows=importData.map(transformRow).filter(r=>r);
    if(importMode==='upsert'&&matchField){for(const row of rows){await supabaseClient.from(tableName).upsert(row,{onConflict:matchField});}}
    else{const{error}=await supabaseClient.from(tableName).insert(rows);if(error){setResult('匯入失敗：'+error.message);setImporting(false);return;}}
    setResult(`成功匯入 ${rows.length} 筆資料`);setImporting(false);setStep('done');if(onImportDone)onImportDone();};
  const resetImport=()=>{setShowImport(false);setStep('upload');setImportData([]);setResult('');};
  return (<div className="flex gap-2 items-center">
    <button onClick={()=>exportCSV(data,columns,filename)} className="bg-brand-dark text-white px-3 py-1.5 rounded text-sm">📤 匯出</button>
    <button onClick={()=>setShowImport(true)} className="border border-brand text-brand-dark px-3 py-1.5 rounded text-sm">📥 匯入</button>
    <button onClick={()=>downloadTemplate(columns,sampleRow,`${entityName}_範本.csv`)} className="text-gray-500 border border-gray-300 px-3 py-1.5 rounded text-sm">📋 範本</button>
    {showImport&&(<div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"><div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-lg">
      <div className="font-bold text-lg mb-4">📥 匯入{entityName}</div>
      {step==='upload'&&(<div onDrop={handleDrop} onDragOver={handleDragOver} className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-brand transition"><div className="text-4xl mb-3">📂</div><div className="text-sm text-gray-600 mb-3">拖曳 CSV 檔案到此處</div><div className="text-xs text-gray-400 mb-3">或</div><label className="bg-brand-dark text-white px-4 py-2 rounded text-sm cursor-pointer hover:bg-brand-active">選擇檔案<input type="file" accept=".csv" onChange={handleFile} className="hidden"/></label><div className="text-xs text-gray-400 mt-3">⚠️ 僅支援 .csv 格式。如用 Numbers 編輯過，請用「檔案→輸出為→CSV」另存</div></div>)}
      {step==='configure'&&(<div><div className="mb-3 text-sm">解析到 <b>{importData.length}</b> 筆資料</div><div className="mb-4"><label className="flex items-center gap-2 text-sm mb-2 cursor-pointer"><input type="radio" checked={importMode==='insert'} onChange={()=>setImportMode('insert')}/> 全部新增</label><label className="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" checked={importMode==='upsert'} onChange={()=>setImportMode('upsert')}/> 比對唯一值覆蓋</label>{importMode==='upsert'&&(<div className="ml-6 mt-2"><select value={matchField} onChange={e=>setMatchField(e.target.value)} className="border border-gray-300 rounded px-2 py-1 text-sm"><option value="">選擇比對欄位</option>{(uniqueFields||[]).map(f=><option key={f} value={f}>{f}</option>)}</select></div>)}</div>
      <div className="max-h-40 overflow-auto border rounded text-xs mb-3"><table className="w-full"><thead><tr>{Object.keys(importData[0]||{}).map(k=><th key={k} className="px-2 py-1 bg-gray-100 text-left">{k}</th>)}</tr></thead><tbody>{importData.slice(0,5).map((r,i)=><tr key={i}>{Object.values(r).map((v,j)=><td key={j} className="px-2 py-1 border-t">{v}</td>)}</tr>)}</tbody></table>{importData.length>5&&<div className="text-center text-gray-400 py-1">...還有 {importData.length-5} 筆</div>}</div>
      <button onClick={doImport} disabled={importing||(importMode==='upsert'&&!matchField)} className="bg-green-500 text-white px-4 py-2 rounded text-sm disabled:opacity-50">{importing?'匯入中...':'確認匯入'}</button></div>)}
      {step==='done'&&(<div><div className="text-green-700 bg-green-50 p-3 rounded mb-3">{result}</div><button onClick={resetImport} className="bg-gray-500 text-white px-4 py-2 rounded text-sm">關閉</button></div>)}
      {step!=='done'&&<button onClick={resetImport} className="mt-3 text-gray-400 text-sm hover:text-gray-600 block">取消</button>}
    </div></div>)}
  </div>);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
